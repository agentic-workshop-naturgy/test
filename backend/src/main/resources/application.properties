spring.application.name=gas-workshop

# H2 datasource
spring.datasource.url=jdbc:h2:file:./data/gasdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# Seed CSV path (relative to working directory; repo root when running from root)
gas.seed.samples-dir=_data/db/samples
